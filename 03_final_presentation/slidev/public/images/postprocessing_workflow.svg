<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <style>
      .text { font-family: 'Inter', -apple-system, sans-serif; }
      .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; text-anchor: middle; }
      .subtitle { font-size: 14px; font-weight: 400; fill: #8a8a8a; text-anchor: middle; }
      .box-title { font-size: 13px; font-weight: 600; fill: #1a1a1a; text-anchor: middle; }
      .box-desc { font-size: 10px; font-weight: 400; fill: #8a8a8a; text-anchor: middle; }
      .box-value { font-family: 'SF Mono', monospace; font-size: 24px; font-weight: 700; fill: #1a1a1a; text-anchor: middle; }
      .arrow { fill: none; stroke: #d0d0d0; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d0d0d0"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="#fafafa"/>

  <text x="480" y="55" class="title">Post-Processing Workflow</text>
  <text x="480" y="82" class="subtitle">Conservative filtering — detection sensitivity over precision</text>

  <!-- Boxes -->
  <g filter="url(#shadow)">
    <rect x="80" y="200" width="160" height="120" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="300" y="180" width="180" height="160" rx="12" fill="#fdf8f6" stroke="#bc4b31" stroke-width="1.5"/>
    <rect x="540" y="180" width="180" height="160" rx="12" fill="#fdf8f6" stroke="#bc4b31" stroke-width="1.5"/>
    <rect x="780" y="200" width="160" height="120" rx="12" fill="#f0f7f4" stroke="#2d6a4f" stroke-width="1.5"/>
  </g>

  <!-- Content -->
  <text x="160" y="245" class="box-title">Raw Mask</text>
  <text x="160" y="268" class="box-desc">3-class prediction</text>
  <text x="160" y="288" class="box-desc">from U-Net</text>

  <text x="390" y="230" class="box-value">&lt; 5,000</text>
  <text x="390" y="265" class="box-title">Kidney Blob Filter</text>
  <text x="390" y="290" class="box-desc">Extra-renal false</text>
  <text x="390" y="308" class="box-desc">positives removed</text>

  <text x="630" y="230" class="box-value">&lt; 100</text>
  <text x="630" y="265" class="box-title">Tumor Blob Filter</text>
  <text x="630" y="290" class="box-desc">Deliberately conservative</text>
  <text x="630" y="308" class="box-desc">preserve small lesions</text>

  <text x="860" y="245" class="box-title" style="fill: #2d6a4f;">3D Mesh +</text>
  <text x="860" y="268" class="box-title" style="fill: #2d6a4f;">Volumes</text>
  <text x="860" y="291" class="box-desc" style="fill: #2d6a4f;">Surface + stats</text>

  <!-- Arrows -->
  <line x1="240" y1="260" x2="280" y2="260" class="arrow"/>
  <line x1="480" y1="260" x2="520" y2="260" class="arrow"/>
  <line x1="720" y1="260" x2="760" y2="260" class="arrow"/>

  <!-- Footer -->
  <text x="480" y="390" style="font-size: 11px; fill: #b0b0b0; text-anchor: middle;">False positives acceptable (physician reviews) · False negatives dangerous (never seen)</text>
</svg>
