<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <style>
      .text { font-family: 'Inter', -apple-system, sans-serif; }
      .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; text-anchor: middle; }
      .subtitle { font-size: 14px; font-weight: 400; fill: #8a8a8a; text-anchor: middle; }
      .box-title { font-size: 14px; font-weight: 700; fill: #1a1a1a; text-anchor: middle; }
      .box-desc { font-size: 10px; font-weight: 400; fill: #8a8a8a; text-anchor: middle; }
      .arrow { fill: none; stroke: #d0d0d0; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d0d0d0"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="#fafafa"/>

  <text x="480" y="55" class="title">Safety Positioning</text>
  <text x="480" y="82" class="subtitle">IEC 62304 Class B — Academic decision-support prototype</text>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect x="60" y="150" width="200" height="140" rx="12" fill="#f0f4f8" stroke="#1e3a5f" stroke-width="1.5"/>
    <rect x="290" y="150" width="200" height="140" rx="12" fill="#f0f7f4" stroke="#2d6a4f" stroke-width="1.5"/>
    <rect x="520" y="150" width="200" height="140" rx="12" fill="#f0f7f4" stroke="#2d6a4f" stroke-width="1.5"/>
    <rect x="750" y="150" width="200" height="140" rx="12" fill="#fdf7f7" stroke="#9b2c2c" stroke-width="1.5"/>
  </g>

  <!-- Card 1: IEC 62304 -->
  <text x="160" y="195" class="box-title">IEC 62304</text>
  <text x="160" y="218" class="box-title">Software Safety</text>
  <text x="160" y="241" class="box-title" style="fill: #1e3a5f;">Class B</text>
  <text x="160" y="268" class="box-desc">SaMD Academic Prototype</text>

  <!-- Card 2: Decision Support -->
  <text x="390" y="195" class="box-title" style="fill: #2d6a4f;">Decision Support</text>
  <text x="390" y="218" class="box-title">NOT Autonomous</text>
  <text x="390" y="241" class="box-title">Diagnosis</text>
  <text x="390" y="268" class="box-desc">System delineates · Physician decides</text>

  <!-- Card 3: Physician Review -->
  <text x="620" y="195" class="box-title" style="fill: #2d6a4f;">Physician Review</text>
  <text x="620" y="218" class="box-title">All Outputs</text>
  <text x="620" y="241" class="box-title">Reviewed</text>
  <text x="620" y="268" class="box-desc">Mandatory before clinical decision</text>

  <!-- Card 4: Not Approved -->
  <text x="850" y="195" class="box-title" style="fill: #9b2c2c;">Academic</text>
  <text x="850" y="218" class="box-title" style="fill: #9b2c2c;">NOT Clinically</text>
  <text x="850" y="241" class="box-title" style="fill: #9b2c2c;">Approved</text>
  <text x="850" y="268" class="box-desc">No FDA · No regulatory submission</text>

  <!-- Arrows -->
  <line x1="260" y1="220" x2="280" y2="220" class="arrow"/>
  <line x1="490" y1="220" x2="510" y2="220" class="arrow"/>
  <line x1="720" y1="220" x2="740" y2="220" class="arrow"/>

  <!-- Bottom harm analysis -->
  <rect x="180" y="340" width="600" height="80" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="370" class="box-title">Most Probable Harm: Non-Serious When Caught in Review</text>
  <text x="480" y="395" class="box-desc">Class C = Autonomous diagnostic systems · NephroVision is NOT one</text>
  <text x="480" y="410" class="box-desc">Following IEC 62304 principles ≠ Regulatory clearance</text>
</svg>
